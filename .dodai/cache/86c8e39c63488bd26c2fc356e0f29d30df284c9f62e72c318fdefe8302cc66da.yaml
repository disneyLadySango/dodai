audience: A visitor who wants to join the waitlist.
call_to_action: Join the waitlist
headline: Register your interest
product_name: Waitlist proof sample
stakeholder_summary: An interchangeable proof sample in which a visitor understands
  the value, joins a waitlist, and remains registered after restart. It demonstrates
  aligned developer and stakeholder projections; it is not dodai’s product value or
  evidence that other journeys are supported.
value_proposition: Understand the product’s value, join its waitlist, and remain registered
  after restart.

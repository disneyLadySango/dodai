origin: dodai
layer:
  number: 4
  name: test_specifications
revision: 7
specifications:
  - id: spec_origin_change_reaches_all_projections
    verifies: [ac_complete_regeneration]
    given: A valid origin and its complete current projection set.
    when: One origin statement changes and the person requests regeneration once.
    then: Every active projection reflects the changed meaning and no projection requires a separate request.
  - id: spec_unchanged_origin_is_stable
    verifies: [ac_stable_regeneration]
    given: A valid unchanged origin and projections previously produced from it.
    when: The person requests regeneration again under the same approved conditions.
    then: The regenerated projection set has no observable difference from the prior set.
  - id: spec_two_roles_share_one_origin
    verifies: [ac_role_projections]
    given: One valid origin describing a minimal product journey.
    when: The person requests its complete projection set.
    then: The result includes an executable developer projection with passing verification and a human-readable stakeholder projection whose claims agree with that behavior.
  - id: spec_solution_language_is_reported
    verifies: [ac_story_vocabulary_warning]
    given: A valid user story and a revision that introduces declared solution vocabulary into its pain.
    when: The revised origin is checked.
    then: The introduced vocabulary and affected story are reported as a layer violation.
  - id: spec_guardrail_breach_revises_verification
    verifies: [ac_outer_loop]
    given: Representative telemetry that breaches an active guardrail without reaching an exit condition.
    when: The telemetry is evaluated against the origin.
    then: Revised test specifications are proposed while the user story and acceptance criterion remain unchanged.
  - id: spec_exit_condition_records_loss
    verifies: [ac_outer_loop]
    given: Representative telemetry that reaches an active exit condition for a product bet.
    when: The telemetry is evaluated against the origin.
    then: A losing record identifying the disproven approach and evidence is appended to the affected user story.
  - id: spec_rebuild_exposes_leaked_decisions
    verifies: [ac_rebuild_comparison]
    given: A valid origin and its complete current projection set.
    when: All projections are discarded, regenerated from the origin, and compared with the prior behavior.
    then: The result reports agreement or identifies each observable mismatch.
  - id: spec_candidate_impact_is_visible
    verifies: [ac_change_impact_visible]
    given: A valid current origin, its active projections, and a candidate revision to one origin statement.
    when: The candidate revision is inspected before approval.
    then: Every downstream origin record and active projection that may change is identified separately from those that remain unaffected.
  - id: spec_candidate_is_atomic
    verifies: [ac_change_preview_and_approval]
    given: A valid current origin and a candidate revision with its complete projected consequences.
    when: The person approves or rejects the candidate revision.
    then: Approval makes the complete revision authoritative once, while rejection leaves the current origin and projections observably unchanged.
  - id: spec_approved_change_is_traceable
    verifies: [ac_approved_change_history]
    given: An approved origin revision and its completed regeneration.
    when: A person reviews the change history.
    then: The prior and current meaning, validation outcome, resulting projection identity, and approval are presented as one connected change.
  - id: spec_guardrail_proposal_can_be_adopted
    verifies: [ac_guardrail_proposal_adoption]
    given: A proposal produced from evidence that breached an active guardrail without reaching an exit condition.
    when: The person adopts the proposal.
    then: The proposed verification becomes authoritative, the affected user story and acceptance criterion remain unchanged, and the complete origin remains valid.
  - id: spec_losing_record_blocks_repetition
    verifies: [ac_losing_record_guides_proposals]
    given: A user story with a losing record and a later candidate that repeats the disproven approach.
    when: The candidate is evaluated for approval.
    then: The repeated approach and its prior evidence are reported, and the candidate is not presented as a viable change.
  - id: spec_pin_and_origin_changes_are_attributed
    verifies: [ac_pin_change_attribution]
    given: An approved origin, active projections, and projection-side stabilization decisions.
    when: Product intent or a stabilization decision changes and regeneration is compared.
    then: Each observable projection change is attributed to the changed origin meaning or to the changed stabilization decision.
  - id: spec_underivable_projection_is_rejected
    verifies: [ac_projection_derivability_gate]
    given: A candidate projection change with no supporting approved origin revision and no explicit projection-side decision.
    when: The candidate is evaluated for acceptance.
    then: The unsupported meaning or behavior is identified and the candidate does not replace the accepted projection.
  - id: spec_second_product_uses_same_discipline
    verifies: [ac_reusable_origin_discipline]
    given: Two valid origins that use different business language and describe different minimal product journeys.
    when: Each origin is validated, revised, and projected for its active roles.
    then: Each journey remains isolated and complete without product-specific changes to dodai.
  - id: spec_supported_language_is_complete
    verifies: [ac_supported_language_audit]
    given: A valid origin and a person using any supported presentation language.
    when: The person inspects all four layers, reviews a candidate revision, and makes an approval decision.
    then: Every meaning, consequence, status, and available action needed for the decision is understandable in the selected language without relying on another language.
  - id: spec_presentation_languages_are_equivalent
    verifies: [ac_presentation_language_equivalence]
    given: The same valid origin, evidence, and candidate revision presented in two supported languages.
    when: Equivalent inspection and decision journeys are completed in each language.
    then: Both journeys report the same affected records, validation outcome, decision result, authoritative origin identity, and projection identity.
  - id: spec_problem_account_reaches_valid_origin
    verifies: [ac_guided_origin_creation]
    given: A person has only a product-bet name, an actor, a pain account, and business language that may be ambiguous.
    when: The person completes the guided discovery and approves the proposed meaning and outcomes.
    then: The first three origin layers are complete and valid, and the person did not need to inspect or edit their internal representation.
  - id: spec_prescribed_solution_returns_to_intent
    verifies: [ac_solution_intent_recovery]
    given: A discovery response includes declared solution vocabulary or a prescribed technical method.
    when: The response is evaluated before becoming authoritative.
    then: The method is identified, the person is asked for the outcome it was intended to achieve, and the method is absent from the resulting user story.
  - id: spec_verification_is_proposed_before_generation
    verifies: [ac_verification_delegation]
    given: Approved outcomes, guardrails, and exit conditions with no approved verification.
    when: Verification is requested.
    then: Every active criterion has observable verification, consequences and coverage are presented together, and no projection work begins before explicit approval.
  - id: spec_product_bets_are_resumable
    verifies: [ac_visible_resumable_progress]
    given: Several product bets at different stages, including one interrupted during a recoverable operation.
    when: A person returns and selects any product bet.
    then: Its stage, completed decisions, next required decision, and failure recovery are visible and the journey resumes without repeating an approved decision.
  - id: spec_generation_requires_informed_consent
    verifies: [ac_generation_consent]
    given: Approved verification and projections that have not yet been generated for the current origin identity.
    when: A person reviews the generation plan.
    then: Intended projection outcomes, maximum external request count, expected variable cost, and cache status are visible, and generation remains stopped until explicit consent.
  - id: spec_approved_identity_never_requests_twice
    verifies: [ac_no_duplicate_model_use]
    given: An approved origin and pins whose semantic meaning has already been derived, including an interrupted later journey.
    when: Generation or resume is requested again.
    then: The approved semantic meaning is reused and no additional external model request occurs.
  - id: spec_generated_result_is_immediately_experienced
    verifies: [ac_runnable_projection_journey]
    given: A product bet whose approved origin has completed generation.
    when: A person reviews the result.
    then: The developer behavior can be experienced immediately, its verification result is visible, and the stakeholder explanation agrees with the same behavior.
  - id: spec_plain_language_change_is_governed
    verifies: [ac_plain_language_change_journey]
    given: A generated product bet and a desired change described in a supported presentation language.
    when: The change is prepared and reviewed.
    then: The highest affected origin layer, changed meaning, downstream records, and projections are presented before approval, and approval regenerates the complete projection set without internal-representation editing.
  - id: spec_evidence_produces_explained_learning_decision
    verifies: [ac_accessible_learning_decision]
    given: Representative outcome evidence for an active product bet.
    when: A person evaluates the evidence against its outcomes, guardrails, and exit conditions.
    then: A continue, revise-verification, or end-bet decision is explained; approved verification changes or losing records remain connected to that product bet and guide later proposals.
  - id: spec_primary_questions_are_enough
    verifies: [ac_lightweight_guided_input]
    given: A person has no operational thresholds or shared-language definition to provide.
    when: The person answers the primary guided questions in ordinary product language.
    then: Verification review is reached, active operational conditions are complete, and no optional context was required.
  - id: spec_optional_context_stays_secondary
    verifies: [ac_lightweight_guided_input]
    given: A person may want to clarify a term whose meaning is specific to the product.
    when: The person reviews the outcome questions.
    then: The clarification is available as collapsed optional context and leaving it empty does not prevent progress.
  - id: spec_verification_review_uses_decision_language
    verifies: [ac_readable_verification_review]
    given: Complete intent, outcomes, operational conditions, and proposed verification.
    when: The person reviews verification before approval.
    then: Approved intent, observable checks, and the consequence of approval are visually distinct, while internal identifiers and verification notation remain outside the primary presentation.
  - id: spec_each_stage_connects_input_to_result
    verifies: [ac_visible_input_to_result]
    given: A person who has not previously used dodai.
    when: The person reviews the first screen, outcome questions, verification review, and generation consent.
    then: Each stage explains the current input, dodai's next responsibility, and the runnable product, verification result, and stakeholder explanation produced at the end.
  - id: spec_primary_story_visible_across_journey
    verifies: [ac_primary_story_visibility]
    given: One approved actor, pain, and outcome is being delegated.
    when: The person reviews delegation, generation, results, a proposed change, or a learning decision.
    then: The same approved actor, pain, and outcome remain visible as the purpose of the work.
  - id: spec_every_presentation_has_origin_evidence
    verifies: [ac_presentation_traceability]
    given: A valid origin and its complete active role-specific presentation set.
    when: The presentation evidence is inspected.
    then: Every active presentation identifies an existing user story, outcome criterion, and verification, with no presentation left unjustified.
  - id: spec_delegation_result_reports_evidence
    verifies: [ac_delegation_evidence]
    given: Delegated work has produced its complete result set.
    when: The person reviews the delegation result.
    then: Produced artifacts, satisfied and unsatisfied verification, and role-specific meaning are presented together against the approved story.
  - id: spec_proof_sample_is_identified
    verifies: [ac_proof_sample_distinction]
    given: A minimal runnable journey is used to demonstrate origin-driven derivation.
    when: The person encounters or evaluates that journey.
    then: It is identified as an interchangeable proof sample and is not presented as dodai's product value or as evidence of unsupported journeys.
  - id: spec_failure_evidence_identifies_layer
    verifies: [ac_failure_layer_diagnosis]
    given: Evidence about the observed problem, expected outcome, or produced behavior is available.
    when: The evidence is evaluated for learning.
    then: The result identifies the disproven layer or states that evidence is inconclusive, and identifies which approved meaning remains fixed and which part changes next.
  - id: spec_delegation_waits_for_informed_consent
    verifies: [ac_bounded_delegation_consent]
    given: Approved intent and verification are ready for delegation.
    when: The person reviews the delegation plan before work begins.
    then: The approved purpose, isolated scope, maximum attempt count, and expected evidence are visible, and no work begins without explicit consent.
  - id: spec_one_approval_starts_one_attempt
    verifies: [ac_one_delegation_per_approval]
    given: One approved delegation whose work is pending, active, completed, or recoverable after interruption.
    when: Concurrent, repeated, or resumed start requests are made.
    then: At most one attempt is started for that approval and its prior result remains resumable.
  - id: spec_delegation_result_has_complete_evidence
    verifies: [ac_complete_delegation_evidence]
    given: Delegated work has reached a completed or failed result.
    when: The person reviews its evidence.
    then: Every changed artifact, verification outcome, and stakeholder meaning is visible and identifies an existing approved story, outcome criterion, and verification.
  - id: spec_result_requires_explicit_adoption
    verifies: [ac_explicit_adoption_decision]
    given: A completed delegation result with its verification evidence.
    when: The person accepts or leaves the result unaccepted.
    then: Acceptance is recorded as an explicit decision, while leaving it unaccepted changes neither the approved origin nor the evidence.
  - id: spec_redelegation_preserves_approved_intent
    verifies: [ac_redelegation_retains_intent]
    given: An unaccepted delegation result and evidence explaining what should improve.
    when: The person requests another attempt.
    then: A new bounded attempt is available with the prior evidence, while the approved actor, pain, outcome, and verification are unchanged.
  - id: spec_regeneration_stays_within_budget
    verifies: [guardrail_regeneration_budget]
    given: The sample product and documented reference conditions.
    when: One complete regeneration is observed.
    then: Elapsed time and variable model cost do not exceed the active thresholds.
  - id: spec_persistent_mismatch_ends_bet
    verifies: [exit_origin_representation]
    given: Rebuild mismatches remain after consecutive representation revisions intended to resolve them.
    when: The number of unsuccessful revisions reaches the active threshold.
    then: The current origin-representation bet is marked for closure before another representation approach is pursued.

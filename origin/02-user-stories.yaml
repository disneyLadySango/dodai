origin: dodai
layer:
  number: 2
  name: user_stories
revision: 9
stories:
  - id: story_authority_drift
    who: A product manager or engineer who delegates implementation to AI agents.
    pain: Product intent, executable behavior, verification, and explanations diverge until the authoritative meaning is unclear.
  - id: story_method_micromanagement
    who: A product manager or engineer who delegates implementation to AI agents.
    pain: Directing technical methods consumes attention that should be spent understanding and solving the business problem.
  - id: story_repeated_translation
    who: A person who communicates the same product intent to developers, stakeholders, and analysts.
    pain: Re-expressing the same intent for each audience creates repeated effort and inconsistent meaning.
  - id: story_failure_diagnosis
    who: A person accountable for a product bet implemented with AI agents.
    pain: When the bet fails, evidence does not reveal whether the problem understanding, chosen approach, or implementation was wrong.
    losing_records: []
  - id: story_safe_origin_evolution
    who: A product manager or engineer who delegates implementation to AI agents.
    pain: Changing product intent without seeing its consequences makes delegation unsafe and forces manual reconciliation after the change.
  - id: story_retained_product_learning
    who: A person accountable for repeated product bets implemented with AI agents.
    pain: Evidence that disproves an approach is separated from later decisions, so people and agents repeat costly bets already known to fail.
  - id: story_reusable_origin_discipline
    who: A product manager or engineer applying the same intent discipline across product bets.
    pain: Applying the discipline to another product bet requires reconstructing its language, outcome standards, and role-specific meaning by hand.
  - id: story_language_barrier
    who: A product manager or engineer who audits product intent and delegated work in their working language.
    pain: Meaning presented only in an unfamiliar language prevents direct inspection and makes consequential decisions depend on an informal translation.
  - id: story_problem_first_start
    who: A product manager or engineer beginning a product bet with an AI agent.
    pain: Starting from technical artifacts forces a solution choice before the actor, pain, vocabulary, and desired outcomes are understood.
  - id: story_delegated_verification
    who: A product manager or engineer responsible for outcomes but delegating technical methods.
    pain: Turning business outcomes into verification requires technical specification work that pulls the person back into micromanaging the agent.
  - id: story_visible_journey
    who: A product manager or engineer progressing through an agent-led product bet.
    pain: When completed decisions, pending approvals, generation work, and failures are not visible together, the person cannot tell what to do next or safely resume later.
  - id: story_runnable_result
    who: A product manager or engineer evaluating delegated product work.
    pain: Generated artifacts cannot be judged as a product outcome when the person cannot immediately experience the resulting behavior.
  - id: story_predictable_model_use
    who: A person accountable for the cost and external effects of agent-led generation.
    pain: Unannounced or repeated model use makes the cost of delegation unpredictable and weakens trust in regeneration.
  - id: story_accessible_learning_loop
    who: A person accountable for deciding whether a product bet should continue, change verification, or end.
    pain: Evidence and prior learning remain operationally useless when reaching a learning decision requires internal commands or implementation knowledge.
  - id: story_multiple_product_bets
    who: A product manager or engineer responsible for more than one product bet over time.
    pain: Without a clear inventory and resumable state, separate bets become difficult to find, distinguish, and continue.
  - id: story_lightweight_origin_input
    who: A product manager or engineer trying origin-driven development for the first time.
    pain: Internal terminology, operational thresholds, ambiguous questions, and required vocabulary work make the person configure the tool before experiencing its value.
  - id: story_visible_input_result
    who: A product manager or engineer deciding whether to entrust product work to an AI agent.
    pain: When the journey does not explain what each answer enables and which observable results will be produced, the person cannot predict the value of continuing.
  - id: story_delegation_handoff_evidence
    who: A product manager or engineer who delegates product work and remains accountable for accepting the result.
    pain: After delegation, gathering changed artifacts, verification, and role-specific meaning by hand makes the result costly to judge and unsafe to adopt.

origin: dodai
layer:
  number: 1
  name: definitions
revision: 8
terms:
  - id: origin
    definition: The sole authority for product intent and constraints jointly maintained by people and AI agents.
    allowed_layers: [1, 2, 3, 4]
  - id: definition
    definition: An approved meaning that supplies vocabulary to lower layers.
    allowed_layers: [1]
  - id: user_story
    definition: A durable account of an actor and a pain, independent of any solution.
    allowed_layers: [1, 2, 3]
  - id: pain
    definition: A costly or limiting condition experienced by an actor.
    allowed_layers: [1, 2, 3]
  - id: acceptance_criterion
    definition: A falsifiable business outcome used to judge the current product bet.
    allowed_layers: [1, 3, 4]
  - id: guardrail
    definition: A boundary whose breach requires a different verification approach without discarding the user story or acceptance criterion.
    allowed_layers: [1, 3, 4]
  - id: exit_condition
    definition: Evidence that ends the current product bet and requires its failure to be recorded.
    allowed_layers: [1, 3, 4]
  - id: test_specification
    definition: An implementation-independent statement of how observable behavior will verify an acceptance criterion.
    allowed_layers: [1, 3, 4]
  - id: projection
    definition: A role-specific presentation derived from the origin and safe to discard and regenerate.
    allowed_layers: [1, 2, 3, 4]
  - id: drift
    definition: A disagreement in meaning or behavior among the origin and its projections.
    allowed_layers: [1, 2, 3, 4]
  - id: regeneration
    definition: Deriving the complete projection set from the current origin.
    allowed_layers: [1, 3, 4]
  - id: stable_projection
    definition: A projection whose observable content is unchanged when its origin and approved pins are unchanged.
    allowed_layers: [1, 3, 4]
  - id: telemetry
    definition: Observations of product outcomes used to evaluate guardrails and exit conditions.
    allowed_layers: [1, 3, 4]
  - id: guardrail_breach
    definition: Telemetry that falls outside an active guardrail.
    allowed_layers: [1, 3, 4]
  - id: losing_record
    definition: A story-level account of a disproven approach and the evidence against repeating it.
    allowed_layers: [1, 2, 3, 4]
  - id: rebuild_test
    definition: A comparison between the current projections and projections regenerated after all prior projections are discarded.
    allowed_layers: [1, 3, 4]
  - id: pin
    definition: A projection-side decision retained to prevent needless variation between regenerations.
    allowed_layers: [1, 3]
  - id: candidate_revision
    definition: A proposed origin change that has not yet become authoritative.
    allowed_layers: [1, 3, 4]
  - id: impact
    definition: The origin records and projections whose meaning or observable behavior may change because of a candidate revision.
    allowed_layers: [1, 2, 3, 4]
  - id: approval
    definition: A person's explicit decision to make a candidate revision authoritative.
    allowed_layers: [1, 3, 4]
  - id: change_history
    definition: An auditable sequence connecting each approved origin revision to its validation and resulting projections.
    allowed_layers: [1, 3, 4]
  - id: proposal
    definition: A non-authoritative candidate for changing verification in response to observed evidence.
    allowed_layers: [1, 3, 4]
  - id: adoption
    definition: Approval that incorporates a proposal into the authoritative origin.
    allowed_layers: [1, 3, 4]
  - id: derivability
    definition: The ability to trace a projection's meaning and observable behavior to approved origin intent or an explicit projection-side decision.
    allowed_layers: [1, 3, 4]
  - id: presentation_language
    definition: A human language in which origin meaning, evidence, and decisions are presented for inspection.
    allowed_layers: [1, 2, 3, 4]
  - id: semantic_equivalence
    definition: Agreement in meaning, consequences, and decisions across presentations of the same authority.
    allowed_layers: [1, 3, 4]
  - id: product_bet
    definition: A bounded attempt to relieve a user pain and achieve declared outcomes.
    allowed_layers: [1, 2, 3, 4]
  - id: discovery
    definition: The process of making an actor, pain, vocabulary, and falsifiable outcomes explicit before choosing technical methods.
    allowed_layers: [1, 2, 3, 4]
  - id: generation_plan
    definition: A reviewable account of the intended projection work, expected model use, and verification before generation begins.
    allowed_layers: [1, 3, 4]
  - id: progress
    definition: The observable current stage, completed decisions, pending decisions, and recoverable failures of a product bet.
    allowed_layers: [1, 2, 3, 4]
  - id: learning_decision
    definition: An evidence-backed choice to continue, revise verification, or end a product bet.
    allowed_layers: [1, 3, 4]
  - id: guided_input
    definition: A primary question a person can answer in ordinary product language without configuring origin mechanics.
    allowed_layers: [1, 2, 3, 4]
  - id: optional_context
    definition: Additional meaning a person may supply when it improves shared understanding but is not required to continue.
    allowed_layers: [1, 2, 3, 4]
  - id: expected_result
    definition: The observable product, verification, or explanation a person receives after an approved action.
    allowed_layers: [1, 2, 3, 4]
  - id: delegation_evidence
    definition: Observable evidence that delegated work preserves approved intent and satisfies or fails its verification.
    allowed_layers: [1, 2, 3, 4]
  - id: presentation_evidence
    definition: An explicit connection from a role-specific presentation to the story, outcome, and verification that justify it.
    allowed_layers: [1, 2, 3, 4]
  - id: proof_sample
    definition: An interchangeable minimal product journey used to demonstrate derivation without defining the product's own value.
    allowed_layers: [1, 2, 3, 4]
  - id: failure_layer
    definition: The highest origin or presentation layer that observed evidence disproves, or an explicit inconclusive result.
    allowed_layers: [1, 2, 3, 4]
  - id: delegation_run
    definition: One bounded attempt to produce and verify work from approved intent.
    allowed_layers: [1, 2, 3, 4]
  - id: artifact_change
    definition: An observable addition, modification, or removal produced during delegated work.
    allowed_layers: [1, 3, 4]
  - id: adoption_decision
    definition: A person's explicit judgment to accept a delegation result or request another attempt.
    allowed_layers: [1, 3, 4]
  - id: experienceable_result
    definition: Delegated product behavior a person can immediately operate when judging whether approved intent was achieved.
    allowed_layers: [1, 2, 3, 4]
boundary_terms:
  story_solution_vocabulary:
    forbidden_in: [2]
    examples:
      - API
      - CLI
      - dashboard
      - database
      - file
      - framework
      - generator
      - library
      - page
      - prompt
      - server
      - storage
      - workflow
  test_implementation_nouns:
    forbidden_in: [4]
    examples:
      - API
      - database
      - file format
      - framework
      - function
      - library
      - protocol
      - table

origin: dodai
layer:
  number: 3
  name: acceptance_criteria
revision: 11
criteria:
  - id: ac_complete_regeneration
    kind: outcome
    supports: [story_authority_drift, story_repeated_translation]
    statement: One origin change can be reflected in every active projection through a single user action.
  - id: ac_stable_regeneration
    kind: outcome
    supports: [story_authority_drift]
    statement: Repeated regeneration from an unchanged origin produces no observable projection change.
  - id: ac_role_projections
    kind: outcome
    supports: [story_repeated_translation]
    statement: The same origin produces both an executable developer projection with verification and a human-readable stakeholder projection.
  - id: ac_story_vocabulary_warning
    kind: outcome
    supports: [story_method_micromanagement]
    statement: Solution vocabulary introduced into a user story is detected and reported without relying on human review.
  - id: ac_outer_loop
    kind: outcome
    supports: [story_failure_diagnosis]
    statement: Given representative telemetry, a guardrail breach proposes revised test specifications, while reaching an exit condition appends a losing record to the affected user story.
  - id: ac_rebuild_comparison
    kind: outcome
    supports: [story_authority_drift, story_failure_diagnosis]
    statement: A person can discard all projections, regenerate them from the origin, and observe whether their behavior differs from the prior projections.
  - id: ac_change_impact_visible
    kind: outcome
    supports: [story_safe_origin_evolution, story_authority_drift]
    statement: Before a candidate revision becomes authoritative, a person can identify every origin record and active projection whose meaning or observable behavior may be affected.
  - id: ac_change_preview_and_approval
    kind: outcome
    supports: [story_safe_origin_evolution, story_authority_drift]
    statement: A person can compare the complete consequences of a candidate revision with the current origin, then approve or reject it without a partial change becoming authoritative.
  - id: ac_approved_change_history
    kind: outcome
    supports: [story_safe_origin_evolution, story_failure_diagnosis]
    statement: Each approved origin revision remains connected to the prior meaning, validation outcome, resulting projection identity, and human approval.
  - id: ac_guardrail_proposal_adoption
    kind: outcome
    supports: [story_failure_diagnosis, story_retained_product_learning]
    statement: A person can adopt a guardrail-breach proposal as revised verification while the supported user story and acceptance criterion remain unchanged.
  - id: ac_losing_record_guides_proposals
    kind: outcome
    supports: [story_failure_diagnosis, story_retained_product_learning]
    statement: A disproven approach recorded in a user story is detected and excluded when later verification or projection changes would repeat it.
  - id: ac_pin_change_attribution
    kind: outcome
    supports: [story_safe_origin_evolution, story_method_micromanagement]
    statement: A person can distinguish a change in product intent from a projection-side stabilization decision and identify which one caused a projection change.
  - id: ac_projection_derivability_gate
    kind: outcome
    supports: [story_safe_origin_evolution, story_authority_drift]
    statement: A projection change that cannot be traced to approved origin intent or an explicit projection-side decision is detected and prevented from becoming the accepted projection.
  - id: ac_reusable_origin_discipline
    kind: outcome
    supports: [story_reusable_origin_discipline, story_repeated_translation]
    statement: The same origin discipline can validate, evolve, and project a second product intent with different business language without product-specific changes to dodai.
  - id: ac_supported_language_audit
    kind: outcome
    supports: [story_language_barrier, story_safe_origin_evolution]
    statement: A person can inspect the complete origin, its consequences, and consequential actions in a supported presentation language without relying on another language.
  - id: ac_presentation_language_equivalence
    kind: outcome
    supports: [story_language_barrier, story_authority_drift]
    statement: Changing the presentation language changes no authoritative meaning, identified consequence, decision result, or projection identity.
  - id: ac_guided_origin_creation
    kind: outcome
    supports: [story_problem_first_start, story_method_micromanagement]
    statement: A person can begin with an account of an actor and pain, resolve ambiguous business language, and reach a valid first three origin layers without editing an internal representation.
  - id: ac_solution_intent_recovery
    kind: outcome
    supports: [story_problem_first_start, story_method_micromanagement]
    statement: When a person's input prescribes a solution, the prescribed method is identified and the underlying intended outcome is recovered before it becomes authoritative.
  - id: ac_verification_delegation
    kind: outcome
    supports: [story_delegated_verification, story_method_micromanagement]
    statement: Complete verification is proposed from approved outcomes, with coverage and observable consequences presented for human approval before projection work begins.
  - id: ac_visible_resumable_progress
    kind: outcome
    supports: [story_visible_journey, story_multiple_product_bets]
    statement: A person can identify every product bet, its current stage, completed decisions, next required decision, and recoverable failure, then resume it without reconstructing prior context.
  - id: ac_generation_consent
    kind: outcome
    supports: [story_predictable_model_use, story_visible_journey]
    statement: Before external model work begins, a person sees the planned projection work, maximum request count, expected variable cost, and cache status, and explicitly consents once.
  - id: ac_no_duplicate_model_use
    kind: outcome
    supports: [story_predictable_model_use, story_authority_drift]
    statement: An unchanged approved origin and pins never cause another external model request, including after interruption and resume.
  - id: ac_runnable_projection_journey
    kind: outcome
    supports: [story_runnable_result, story_repeated_translation]
    statement: After approved generation, a person can immediately experience the developer projection, inspect its verification result, and read the aligned stakeholder meaning from the same product bet.
  - id: ac_plain_language_change_journey
    kind: outcome
    supports: [story_safe_origin_evolution, story_language_barrier]
    statement: A person can describe a desired change in their working language, review the highest affected origin layer and complete consequences, and approve stable regeneration without editing an internal representation.
  - id: ac_accessible_learning_decision
    kind: outcome
    supports: [story_accessible_learning_loop, story_failure_diagnosis]
    statement: A person can provide representative outcome evidence and receive an explained continue, revise-verification, or end-bet decision, with approved learning connected to the affected product bet.
  - id: ac_lightweight_guided_input
    kind: outcome
    supports: [story_lightweight_origin_input, story_problem_first_start]
    statement: A person can reach verification review by answering only ordinary questions about the person, pain, observable improvement, and the first-action-to-result experience; operational thresholds are owned by dodai and additional shared language is optional context.
  - id: ac_readable_verification_review
    kind: outcome
    supports: [story_lightweight_origin_input, story_delegated_verification]
    statement: Before approval, a person can distinguish their approved intent, what dodai will verify, and what approval starts without reading internal record identifiers or verification notation.
  - id: ac_visible_input_to_result
    kind: outcome
    supports: [story_visible_input_result, story_visible_journey]
    statement: From the first screen through generation consent, each stage states what the person provides, what dodai does next, and which runnable, verified, and explanatory results the person will receive.
  - id: ac_primary_story_visibility
    kind: outcome
    supports: [story_authority_drift, story_visible_journey]
    statement: Throughout delegation, generation, result review, change, and learning, a person can see the approved actor, pain, and outcome that the work is intended to serve.
  - id: ac_presentation_traceability
    kind: outcome
    supports: [story_authority_drift, story_repeated_translation]
    statement: Every active role-specific presentation identifies the approved user story, outcome criterion, and verification that justify its meaning or behavior.
  - id: ac_delegation_evidence
    kind: outcome
    supports: [story_method_micromanagement, story_authority_drift]
    statement: A person can judge delegated work from its produced artifacts and satisfied or unsatisfied verification against the approved story, without evaluating the technical method used.
  - id: ac_proof_sample_distinction
    kind: outcome
    supports: [story_authority_drift]
    statement: A runnable sample used to prove derivation is clearly distinguished from dodai's product value and does not imply that other product journeys are supported without evidence.
  - id: ac_failure_layer_diagnosis
    kind: outcome
    supports: [story_failure_diagnosis, story_retained_product_learning]
    statement: Given outcome evidence, a person can identify whether it disproves the problem understanding, verification approach, or produced behavior, or whether the evidence is inconclusive, and can see what remains fixed and what changes next.
  - id: ac_bounded_delegation_consent
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_predictable_model_use]
    statement: Before delegated work begins, a person sees its approved intent, isolated scope, maximum attempt count, and expected evidence, and explicitly consents once.
  - id: ac_one_delegation_per_approval
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_predictable_model_use]
    statement: Concurrent, repeated, or resumed requests for the same approval never start more than one delegation attempt.
  - id: ac_complete_delegation_evidence
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_authority_drift, story_repeated_translation]
    statement: A completed delegation presents changed artifacts, verification outcomes, and stakeholder meaning together, with each item traced to the approved story, outcome criterion, and verification.
  - id: ac_explicit_adoption_decision
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_authority_drift]
    statement: A person can explicitly accept a verified delegation result or leave it unaccepted without changing the approved origin.
  - id: ac_redelegation_retains_intent
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_failure_diagnosis]
    statement: A person can request another attempt with evidence about the prior result while the approved actor, pain, outcome, and verification remain unchanged.
  - id: ac_experienceable_delegation_result
    kind: outcome
    supports: [story_runnable_result, story_delegation_handoff_evidence]
    statement: After delegation, a person can immediately operate the resulting product behavior while inspecting its verification and stakeholder meaning against the same approved intent.
  - id: ac_plain_interaction_evidence
    kind: outcome
    supports: [story_accessible_learning_loop, story_failure_diagnosis]
    statement: After operating one delegation result, a person can describe what they observed without choosing a technical failure layer, and the resulting diagnosis remains connected to that run.
  - id: ac_evidence_guided_reverification
    kind: outcome
    supports: [story_failure_diagnosis, story_retained_product_learning]
    statement: When evidence shows that verified behavior did not achieve the approved outcome, only revised verification is proposed while the supported user story and acceptance criterion remain unchanged until explicit approval.
  - id: ac_delegation_attempt_comparison
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_retained_product_learning]
    statement: After another delegation run, a person can compare prior and current artifacts, verification, and interaction evidence against the approved intent.
  - id: ac_presentation_only_repair
    kind: outcome
    supports: [story_failure_diagnosis, story_authority_drift]
    statement: When interaction evidence shows that produced behavior failed, a person can approve one presentation repair attempt while every approved origin layer remains observably unchanged.
  - id: ac_repair_verification_comparison
    kind: outcome
    supports: [story_delegation_handoff_evidence, story_retained_product_learning]
    statement: After a presentation repair attempt, a person can compare the failed and repaired behavior, artifacts, and verification without treating repaired behavior as proof that the business outcome occurred.
  - id: ac_problem_rediscovery_requires_observation
    kind: outcome
    supports: [story_failure_diagnosis, story_problem_first_start]
    statement: Evidence that does not confirm the current pain opens guided discovery without automatically changing the approved user story.
  - id: ac_disproven_story_is_retained
    kind: outcome
    supports: [story_retained_product_learning, story_safe_origin_evolution]
    statement: A newly observed Who and Pain can become a Layer 2 candidate while the prior problem account and its evidence remain connected as a losing record and every downstream impact is visible before approval.
  - id: guardrail_regeneration_budget
    kind: guardrail
    supports: [ac_complete_regeneration]
    statement: Complete regeneration of the sample product remains practical during interactive use.
    measures:
      - name: elapsed_time
        comparator: less_than_or_equal_to
        threshold: 120
        unit: seconds
      - name: variable_model_cost
        comparator: less_than_or_equal_to
        threshold: 1
        unit: USD
    observation_scope: One complete regeneration of the sample product under the documented reference conditions.
    status: proposed_for_approval
  - id: exit_origin_representation
    kind: exit_condition
    supports: [ac_rebuild_comparison]
    statement: End the current origin-representation bet when rebuild mismatches persist through three consecutive representation revisions intended to resolve them.
    measure:
      name: consecutive_unsuccessful_representation_revisions
      comparator: greater_than_or_equal_to
      threshold: 3
      unit: revisions
    status: proposed_for_approval

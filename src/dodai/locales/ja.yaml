language: ja
name: 日本語
content:
  introduction: 監査可能な1つの原点から、技術的なHowを指定せず、動く成果物・検証・関係者向けの意味を導出します。
  stakeholder_summary: プロダクトマネージャーとエンジニアは、変更の影響を承認前に確認し、1つの正本から安定した開発者向け射影と関係者向け射影を得られます。
ui:
  "dodai / origin workbench": "dodai / 原点ワークベンチ"
  "01 · Definitions": "01 · 定義層"
  "02 · User stories": "02 · ユーザーストーリー"
  "03 · Acceptance criteria": "03 · 成果基準"
  "04 · Test specifications": "04 · テスト仕様"
  "From intent to evidence": "意図から証拠へ"
  "Origin workbench": "原点ワークベンチ"
  "Repository aligned": "リポジトリ整合済み"
  "Origin-driven development": "原点駆動開発"
  "From intent<br>to evidence.": "意図から<br>証拠へ。"
  "One auditable origin becomes executable software, verification, and stakeholder meaning—without prescribing technical How.": "監査可能な1つの原点から、技術的なHowを指定せず、動く成果物・検証・関係者向けの意味を導出します。"
  "Current origin": "現在の原点"
  "stable regeneration": "安定した再射影"
  "Projection lineage": "射影の系譜"
  "Human intent": "人間の意図"
  "4 origin layers": "原点の4層"
  "Definitions, solution-free stories, falsifiable outcomes,\n          and implementation-independent tests.": "定義、Howを含まないストーリー、反証可能な成果、実装に依存しないテスト仕様。"
  "audited files": "監査対象"
  "Model judgment": "モデルの判断"
  "Derives shared product meaning once. The approved bundle is addressed\n          by the origin digest.": "共有するプロダクトの意味を一度導出し、承認済みの束を原点ダイジェストで識別します。"
  "cached bundle": "キャッシュ済みの意味束"
  "Deterministic": "決定的な導出"
  "Developer projection": "開発者向け射影"
  "Executable waitlist behavior and tests generated from the same approved meaning.": "同じ承認済みの意味から、動く待機リストとテストを生成します。"
  "executable files": "実行可能ファイル"
  "Same meaning": "同じ意味"
  "Stakeholder projection": "関係者向け射影"
  "aligned brief": "整合した説明"
  "Touch the projection": "射影を触る"
  "Open the generated waitlist, register, and observe persistent behavior.": "生成された待機リストを開き、登録して、再起動後も残る振る舞いを確認します。"
  "Open generated product →": "生成プロダクトを開く →"
  "Break a guardrail": "ガードレールを破る"
  "Feed slow regeneration telemetry into the outer learning loop.": "遅い再生成のテレメトリを外側の学習ループへ入力します。"
  "Run isolated scenario →": "隔離シナリオを実行 →"
  "Manage agents by outcomes, not methods.": "方法ではなく成果でエージェントを管理する。"
  "No API request · Local only": "API呼び出しなし・ローカルのみ"
  "Observed telemetry": "観測テレメトリ"
  "Dodai response": "Dodaiの応答"
  "The demonstration ran in an isolated copy.\n            The authoritative origin stayed unchanged.": "デモは隔離コピーで実行され、正本の原点は変更されていません。"
  "Adopt as layer-four verification →": "第4層の検証として採用 →"
  "Change intent.<br>See consequences.": "意図を変える。<br>影響を見る。"
  "The current origin remains authoritative until a complete candidate is valid\nand explicitly approved. Approval regenerates every active projection as one governed change.": "完全な候補が有効となり明示承認されるまで、現在の原点が正本です。承認すると、管理された1変更として全射影を再生成します。"
  "Four origin layers": "原点の4層"
  "Edit authoritative source": "正本の原文を編集する"
  "Preview complete impact →": "影響全体をプレビュー →"
  "Candidate impact": "候補の影響"
  "Origin records": "原点レコード"
  "Active projections": "有効な射影"
  "Cannot approve": "承認できません"
  "Approve and regenerate →": "承認して再射影 →"
  "Change history": "変更履歴"
  "Showcase": "ショーケース"
  "Revision approved and every projection regenerated.": "変更を承認し、すべての射影を再生成しました。"
  "Approval failed; the authoritative origin is unchanged.": "承認に失敗しました。正本の原点は変更されていません。"
records:
  origin: 人とAIが共同管理する、意図と制約の唯一の正本。
  definition: 下位層へ意味と語彙を供給する、承認済みの定義。
  user_story: 解決方法から独立した、利用者と長期的な痛みの記録。
  pain: 利用者が経験する、コストや制約を生む状態。
  acceptance_criterion: 現在の賭けを判定する、反証可能なビジネス成果。
  guardrail: 破った場合に別の検証方法へ切り替える境界。
  exit_condition: 現在の賭けを終了し、敗戦記録を必要とする証拠。
  test_specification: ACを観測可能な振る舞いで検証する、実装非依存の記述。
  projection: 原点から導出され、破棄・再生成できるロール別の表現。
  drift: 原点と射影の意味または振る舞いの不一致。
  regeneration: 現在の原点から全射影を導出すること。
  stable_projection: 原点とピンが同じなら観測内容が変わらない射影。
  telemetry: ガードレールと撤退条件を評価するプロダクト成果の観測値。
  guardrail_breach: 有効なガードレール範囲を外れたテレメトリ。
  losing_record: 再試行すべきでない否定済みアプローチと証拠の記録。
  rebuild_test: 既存射影と全削除後に再生成した射影の比較。
  pin: 再生成の不要な揺れを防ぐ、射影側に保持された判断。
  candidate_revision: まだ正本ではない、原点変更の提案。
  impact: 候補変更で意味や振る舞いが変わり得る原点レコードと射影。
  approval: 候補変更を正本にする、人間の明示的判断。
  change_history: 承認済み原点変更を検証と射影へ結ぶ監査可能な履歴。
  proposal: 観測された証拠に応じて検証を変える、未承認の候補。
  adoption: 提案を正本へ取り込む承認。
  derivability: 射影の意味と振る舞いを原点または明示的ピンへ追跡できる性質。
  presentation_language: 原点・証拠・判断を監査するために選ぶ人間の言語。
  semantic_equivalence: 同じ正本の異なる表現で、意味・影響・判断が一致すること。
  product_bet: 利用者の痛みを減らし、宣言した成果へ到達するための境界ある試み。
  discovery: 技術的方法を選ぶ前に、利用者・痛み・語彙・成果を明示する過程。
  generation_plan: 生成前に確認できる、射影作業・モデル利用・検証の計画。
  progress: 賭けの現在地、完了判断、次の判断、復旧可能な失敗。
  learning_decision: 証拠に基づき、続行・検証変更・撤退を選ぶ判断。
  guided_input: 原点の仕組みを設定せず、通常のプロダクト言語で答えられる主要な質問。
  optional_context: 共通理解に役立つ場合だけ追加でき、先へ進むためには必須でない意味の補足。
  expected_result: 承認した操作の後に得られる、観測可能なプロダクト・検証・説明。
  delegation_evidence: 委譲した仕事が承認済み意図を保ち、検証を満たしたかを示す観測可能な証拠。
  presentation_evidence: ロール別Presentationを、その根拠となるストーリー・成果・検証へ明示的に結ぶ証拠。
  proof_sample: 導出を証明するための交換可能な最小プロダクト体験で、Dodai自身の価値を定義しないもの。
  failure_layer: 証拠によって否定された最上位の原点またはPresentation層、もしくは判断不能という明示的結果。
  delegation_run: 承認済み意図から成果を作り検証する、境界のある1回の委譲。
  artifact_change: 委譲作業によって生じた、観測可能な追加・変更・削除。
  adoption_decision: 委譲結果を採用するか、再試行を求める人の明示的判断。
  experienceable_result: 委譲結果が承認済み意図を満たすか判断するため、その場で操作できるプロダクトの振る舞い。
  interaction_evidence: 1回の委譲結果を操作して観測した事実を、変更せず残す記録。
  attempt_comparison: 同じ、または明示改訂された承認済み意図に対し、複数の委譲試行の観測差を判断すること。
  presentation_repair: 操作証拠で動作失敗が示された後、承認済み原点を変えずに成果だけを再構築する境界付き修復。
  problem_rediscovery: 現在の課題が証拠で確認できないとき、否定された見立てを学習として残しながらWhoとPainへ戻る統制された発見。
  story_authority_drift: 意図・実行・検証・説明がずれ、何が正しい意味か分からなくなる。
  story_method_micromanagement: 技術的方法の指示に時間を奪われ、ビジネス課題へ集中できない。
  story_repeated_translation: 同じ意図を対象者ごとに翻訳し直し、手間と意味の不一致が生じる。
  story_failure_diagnosis: 失敗時に、課題理解・How・実装のどこが誤りか切り分けられない。
  story_safe_origin_evolution: 影響を見ずに意図を変えると、安全に委任できず手作業の調整が必要になる。
  story_retained_product_learning: 否定された方法の証拠が後の判断から離れ、同じ失敗を繰り返す。
  story_reusable_origin_discipline: 別の賭けへ適用するたびに、言語・成果基準・説明を作り直す必要がある。
  story_language_barrier: 不慣れな言語だけの表現では直接監査できず、非公式な翻訳へ判断を依存する。
  story_problem_first_start: 技術成果物から始めると、利用者・痛み・語彙・成果を理解する前に解決方法を選んでしまう。
  story_delegated_verification: ビジネス成果を検証へ変換する作業が、人間を技術的マイクロマネジメントへ引き戻す。
  story_visible_journey: 完了判断・承認待ち・生成・失敗が一緒に見えず、次に何をすべきか分からない。
  story_runnable_result: 生成物をすぐ体験できなければ、プロダクト成果として判断できない。
  story_predictable_model_use: 予告のない重複モデル利用により、委譲コストが予測不能になる。
  story_accessible_learning_loop: 内部コマンドや実装知識が必要だと、証拠と学習を判断へ利用できない。
  story_multiple_product_bets: 案件の一覧と再開状態がなければ、複数の賭けを見つけて継続できない。
  story_lightweight_origin_input: 内部用語・運用値・曖昧な質問・必須の用語定義が、価値を試す前の設定作業になっている。
  story_visible_input_result: 各回答で何が進み、最後に何が生成されるか見えないと、続ける価値を判断できない。
  story_delegation_handoff_evidence: 委譲後に変更成果・検証・ロール別の意味を手で集めないと、結果の判断コストが高く安全に採用できない。
  ac_complete_regeneration: 原点への1変更を、1回の操作で全射影へ反映できる。
  ac_stable_regeneration: 原点が同じなら、再射影しても観測可能な差がない。
  ac_role_projections: 同じ原点から、実行可能な開発者向け射影と人間可読な関係者向け射影が得られる。
  ac_story_vocabulary_warning: ストーリーへ混入したソリューション語彙を機械的に検出する。
  ac_outer_loop: ガードレール違反では検証変更を提案し、撤退条件では敗戦記録を追記する。
  ac_rebuild_comparison: 全射影を捨てて再生成し、以前との振る舞いの差を観測できる。
  ac_change_impact_visible: 承認前に影響を受ける全レコードと射影を特定できる。
  ac_change_preview_and_approval: 候補の全影響を比較し、部分変更なしに承認または却下できる。
  ac_approved_change_history: 承認変更を前後の意味・検証・射影・承認者へ結び付けて残す。
  ac_guardrail_proposal_adoption: ストーリーとACを変えずに、ガードレール由来の検証提案を採用できる。
  ac_losing_record_guides_proposals: 過去に否定された方法の再提案を検出し除外する。
  ac_pin_change_attribution: 意図変更と射影安定化判断を区別し、差分原因を特定できる。
  ac_projection_derivability_gate: 原点またはピンへ追跡できない射影変更を拒否する。
  ac_reusable_origin_discipline: 異なる業務語彙の別プロダクトにも、Dodai固有変更なしで適用できる。
  ac_supported_language_audit: 対応言語だけで原点・影響・重要操作を完全に監査できる。
  ac_presentation_language_equivalence: 表示言語を変えても、意味・影響・判断・射影IDは変わらない。
  ac_guided_origin_creation: 内部表現を編集せず、利用者と痛みから有効な原点第1〜3層へ到達できる。
  ac_solution_intent_recovery: 解決方法を検出し、正本化する前に意図した成果へ戻せる。
  ac_verification_delegation: 承認済み成果から完全な検証を提案し、射影前に人間が承認できる。
  ac_visible_resumable_progress: 全案件の現在地・完了判断・次の判断・失敗を確認して再開できる。
  ac_generation_consent: モデル利用前に作業・最大回数・費用上限・キャッシュを確認し、一度だけ承認する。
  ac_no_duplicate_model_use: 原点とピンが同じなら、中断後も外部モデルを再度呼ばない。
  ac_runnable_projection_journey: 生成直後に動く射影、検証結果、同じ意味の説明を確認できる。
  ac_plain_language_change_journey: 内部表現を編集せず、自然言語の変更影響を承認して安定再射影できる。
  ac_accessible_learning_decision: 成果データから続行・検証変更・撤退の理由を得て、学習を賭けへ残せる。
  ac_lightweight_guided_input: 人・困りごと・改善・最初の行動から結果だけを答えれば検証確認へ進め、運用値はDodaiが持ち、言葉の補足は任意である。
  ac_readable_verification_review: 内部IDや検証記法を読まず、承認した意図・Dodaiの確認内容・承認後に始まることを区別できる。
  ac_visible_input_to_result: 最初の画面から生成承認まで、入力・Dodaiの次の仕事・最後に得られる3つの成果が分かる。
  ac_primary_story_visibility: 委譲から学習まで、仕事が誰の痛みと成果のためかを常に確認できる。
  ac_presentation_traceability: すべての有効なPresentationを、根拠となるストーリー・成果基準・検証へ追跡できる。
  ac_delegation_evidence: 技術的方法を評価せず、成果物と検証証拠から委譲結果を判断できる。
  ac_proof_sample_distinction: 実行サンプルがDodaiの価値ではなく、交換可能な証明題材だと明確に分かる。
  ac_failure_layer_diagnosis: 成果証拠から、課題理解・検証方法・生成結果のどこが否定されたか、または判断不能かを切り分けられる。
  ac_bounded_delegation_consent: 委譲前に意図・隔離範囲・最大試行回数・得られる証拠を確認し、一度だけ明示承認する。
  ac_one_delegation_per_approval: 同じ承認への同時・反復・再開要求でも、委譲試行は1回しか開始されない。
  ac_complete_delegation_evidence: 変更成果・検証結果・関係者向けの意味が一緒に提示され、すべて原点へ追跡できる。
  ac_explicit_adoption_decision: 検証済みの委譲結果を明示的に採用するか、原点を変えず未採用にできる。
  ac_redelegation_retains_intent: 前回結果の証拠を添えて、承認済みの人・痛み・成果・検証を変えずに再委譲できる。
  ac_experienceable_delegation_result: 委譲後、その場で成果を操作し、同じ承認済み意図に対する検証と説明を確認できる。
  ac_plain_interaction_evidence: 技術的な失敗層を選ばず操作結果を説明し、その診断を委譲試行へ接続して残せる。
  ac_evidence_guided_reverification: 動作しても成果に届かない証拠では、StoryとACを固定し、明示承認前は正本を変えず第4層だけを提案する。
  ac_delegation_attempt_comparison: 再委譲後、承認済み意図に対する新旧の成果・検証・操作証拠を比較できる。
  ac_presentation_only_repair: 動作失敗の操作証拠から、原点4層を変えずにPresentationだけを1回修復できる。
  ac_repair_verification_comparison: 修復前後の動作・成果物・検証を比較し、動作修復を事業成果の達成と混同しない。
  ac_problem_rediscovery_requires_observation: 現在の困りごとが確認できない証拠から、ユーザーストーリーを自動変更せず発見へ戻れる。
  ac_disproven_story_is_retained: 新しいWhoとPainの候補に、否定された見立てと証拠を敗戦記録として残し、承認前に全影響を確認できる。
  guardrail_regeneration_budget: 全射影の再生成を対話的に使える時間と費用へ収める。
  exit_origin_representation: 表現改訂を3回続けてもリビルド不一致なら、現在の表現方式を撤退する。
  spec_origin_change_reaches_all_projections: 原点の1文を変え1回再生成すると、全射影へ反映されることを検証する。
  spec_unchanged_origin_is_stable: 同じ承認条件で再生成し、以前との差がないことを検証する。
  spec_two_roles_share_one_origin: 1つの原点から、動く開発者向け成果と一致する関係者向け説明が得られることを検証する。
  spec_solution_language_is_reported: ストーリーへ禁止語彙を入れ、違反箇所が報告されることを検証する。
  spec_guardrail_breach_revises_verification: 撤退条件未到達のガードレール違反で、ストーリーとACを固定した検証変更が提案されることを検証する。
  spec_exit_condition_records_loss: 撤退条件到達時に、否定された方法と証拠がストーリーへ追記されることを検証する。
  spec_rebuild_exposes_leaked_decisions: 全射影を再構築し、導出不能な差分が報告されることを検証する。
  spec_candidate_impact_is_visible: 承認前に、影響あり・なしの原点レコードと射影が区別されることを検証する。
  spec_candidate_is_atomic: 承認では全変更が一度に正本となり、却下では何も変わらないことを検証する。
  spec_approved_change_is_traceable: 承認変更の前後・検証・射影ID・承認が一続きで確認できることを検証する。
  spec_guardrail_proposal_can_be_adopted: 提案採用後もストーリーとACが同じで、原点全体が有効なことを検証する。
  spec_losing_record_blocks_repetition: 敗戦記録と同じ方法の候補が、証拠付きで拒否されることを検証する。
  spec_pin_and_origin_changes_are_attributed: 射影差分が原点変更またはピン変更へ正しく帰属することを検証する。
  spec_underivable_projection_is_rejected: 根拠のない射影変更が特定され、採用射影を置き換えないことを検証する。
  spec_second_product_uses_same_discipline: 異なる2つの原点を同じ規律で検証・変更・射影できることを検証する。
  spec_supported_language_is_complete: 対応言語だけで4層・変更候補・影響・承認を理解できることを検証する。
  spec_presentation_languages_are_equivalent: 2言語の同じ操作が、同じ影響・検証・判断・原点ID・射影IDになることを検証する。
  spec_problem_account_reaches_valid_origin: 名前・利用者・痛み・曖昧な語彙から、内部表現を触らず有効な第1〜3層へ到達することを検証する。
  spec_prescribed_solution_returns_to_intent: Howを検出して意図した成果を問い、ストーリーからHowを除くことを検証する。
  spec_verification_is_proposed_before_generation: 全ACの検証と影響を提示し、承認前に射影が始まらないことを検証する。
  spec_product_bets_are_resumable: 複数案件の現在地と次の判断が見え、承認済み判断を繰り返さず再開できることを検証する。
  spec_generation_requires_informed_consent: 射影・最大API回数・費用上限・キャッシュを示し、承認まで生成しないことを検証する。
  spec_approved_identity_never_requests_twice: 承認済みの同一意味を再利用し、外部モデルを重複実行しないことを検証する。
  spec_generated_result_is_immediately_experienced: 動く成果、検証結果、関係者向け説明を同時に確認できることを検証する。
  spec_plain_language_change_is_governed: 自然言語変更の最上位層と全影響を承認前に示し、一括再射影することを検証する。
  spec_evidence_produces_explained_learning_decision: 証拠から続行・検証変更・撤退を説明し、学習を次の提案へ残すことを検証する。
  spec_regeneration_stays_within_budget: 再生成の時間と変動費が有効なしきい値以内であることを検証する。
  spec_persistent_mismatch_ends_bet: 不一致改訂数がしきい値へ達したら、別方式の前に現在の賭けを終了することを検証する。
  spec_primary_questions_are_enough: 運用値や言葉の補足なしでも、主要質問だけで有効な検証確認へ進めることを検証する。
  spec_optional_context_stays_secondary: プロダクト固有の言葉の補足は閉じた任意項目で、空でも進めることを検証する。
  spec_verification_review_uses_decision_language: 意図・観測可能な確認・承認後の結果が視覚的に分かれ、内部IDと検証記法が主要表示に出ないことを検証する。
  spec_each_stage_connects_input_to_result: 各段階で入力・Dodaiの次の仕事・最後の動く成果・検証・説明が結び付いて見えることを検証する。
  spec_primary_story_visible_across_journey: 委譲・生成・結果・変更・学習で、同じ人・痛み・成果が目的として見えることを検証する。
  spec_every_presentation_has_origin_evidence: 全Presentationが既存のストーリー・成果基準・検証を根拠として持つことを検証する。
  spec_delegation_result_reports_evidence: 委譲結果で、成果物・合格と不合格の検証・ロール別の意味を同じストーリーに対して確認できることを検証する。
  spec_proof_sample_is_identified: 最小体験が交換可能な証明サンプルであり、Dodaiの製品価値や未証明の対応範囲として示されないことを検証する。
  spec_failure_evidence_identifies_layer: 証拠が否定する層または判断不能を示し、固定する意味と次に変える部分が分かることを検証する。
  spec_delegation_waits_for_informed_consent: 意図・隔離範囲・最大試行回数・証拠が見え、明示承認まで委譲が始まらないことを検証する。
  spec_one_approval_starts_one_attempt: 同じ承認への同時・反復・再開要求でも、最大1回しか試行が始まらないことを検証する。
  spec_delegation_result_has_complete_evidence: 全変更成果・検証結果・関係者向けの意味が見え、既存のStory・AC・検証へ接続されることを検証する。
  spec_result_requires_explicit_adoption: 採用が明示判断として記録され、未採用では原点と証拠が変わらないことを検証する。
  spec_redelegation_preserves_approved_intent: 前回証拠を含む新しい試行でも、承認済みの人・痛み・成果・検証が変わらないことを検証する。
  spec_delegated_result_is_immediately_experienced: 委譲後の成果をその場で操作でき、検証と関係者向け説明が同じ承認済み意図へ接続されることを検証する。
  spec_plain_observation_identifies_failure_layer: 困りごと・動作・成果と観測事実への回答から、技術層を選ばせず診断し、その試行へ証拠を残すことを検証する。
  spec_verification_failure_prepares_only_reverification: 動作しても成果に届かない証拠では、StoryとACを固定し、明示承認前に正本を変えず第4層候補だけを作ることを検証する。
  spec_redelegation_attempts_are_compared: 再委譲後、承認済み意図に対する新旧試行の成果・検証・操作証拠を比較できることを検証する。
  spec_behavior_failure_repairs_only_presentation: 動作失敗の証拠から修復しても、原点4層が変わらず原点変更案も作られないことを検証する。
  spec_repair_result_separates_behavior_from_outcome: 修復前後を比較し、検証済み動作と未確認の事業成果を区別することを検証する。
  spec_problem_evidence_opens_discovery_without_rewrite: 困りごとが確認できない証拠だけでは原点を変えず、発見入力を開くことを検証する。
  spec_rediscovered_problem_preserves_loss_and_impact: 新しいWhoとPainの第2層候補に敗戦記録と下位層・射影への全影響が示されることを検証する。
